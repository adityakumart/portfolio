<mat-card class="matCard modern-card mb-4 reveal-on-scroll">
    <mat-card-header>
        <mat-card-title class="gradient-title">Education</mat-card-title>
    </mat-card-header>
    <mat-card-content class="work-experience-content mt-4">
        @for (edu of education(); track $index) {
        <div class="work-item mb-4 reveal-on-scroll">
            <div class="work-header d-flex justify-content-between align-items-center flex-wrap mb-1">
                <h3 class="m-0 font-weight-bold">
                    <a [href]="edu.url" target="_blank" class="work-company">{{edu.institution}}</a>
                </h3>
                <span class="work-dates badge-modern">{{edu.startDate}} - {{edu.endDate}}</span>
            </div>
            <!-- <div class="work-position mb-2 text-primary">{{edu.studyType}} in {{edu.area}}</div> -->
            @if (edu.courses && edu.courses.length) {
            <div class="work-position mb-2 text-primary">{{edu.courses.join(', ')}}</div>
            }
            
        </div>
        @if (!$last) { <hr class="work-divider"> }
        }
    </mat-card-content>
</mat-card>
