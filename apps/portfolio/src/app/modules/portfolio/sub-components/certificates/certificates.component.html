<section class="certificates-section reveal-on-scroll">
  <div class="section-heading">
    <div>
      <h2 class="section-title">Certificates</h2>
      <p class="section-note">
        Professional certifications and completed courses.
      </p>
    </div>
  </div>

  <div class="certificates-grid-container">
    @for (cert of certificates(); track cert.name) {
      <div class="certificate-grid-item reveal-on-scroll">
        <mat-card
          class="certificateCard modern-card certificate-card-with-accent"
        >
          <mat-card-header>
            <mat-card-title class="fs-16 font-weight-bold">
              <a [href]="cert.url" target="_blank" class="cert-link">{{
                cert.name
              }}</a>
            </mat-card-title>
            <mat-card-subtitle
              class="mt-2 d-flex justify-content-between align-items-center"
            >
              <span class="cert-issuer">{{ cert.issuer }}</span>
              <span class="cert-date">{{ cert.date }}</span>
            </mat-card-subtitle>
          </mat-card-header>
        </mat-card>
      </div>
    }
  </div>
</section>
