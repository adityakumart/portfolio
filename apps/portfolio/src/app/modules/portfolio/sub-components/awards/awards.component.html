<section class="awards-section reveal-on-scroll">
  <div class="section-heading">
    <div>
      <h2 class="section-title">Awards & Recognitions</h2>
      <p class="section-note">Key achievements and honors received.</p>
    </div>
  </div>

  <div class="awards-grid-container">
    @for (award of awards(); track award.title) {
      <div class="award-grid-item reveal-on-scroll">
        <mat-card class="awardCard modern-card award-card-with-accent">
          <mat-card-header>
            <mat-card-title class="fs-16 font-weight-bold">{{
              award.title
            }}</mat-card-title>
            <mat-card-subtitle
              class="mt-2 d-flex justify-content-between align-items-center"
            >
              <span class="award-issuer">{{ award.awarder }}</span>
              <span class="award-date">{{ award.date }}</span>
            </mat-card-subtitle>
          </mat-card-header>
          <mat-card-content class="mt-3">
            <p class="award-summary fs-14">{{ award.summary }}</p>
          </mat-card-content>
        </mat-card>
      </div>
    }
  </div>
</section>
